# Instancia SDD del repositorio sdd-kit (dogfooding)
# Ver ADOPTION.md para el plan de adopción y separación producto/proceso.

project:
  name: "SDD Kit"
  development_branch: dev
  production_branch: main

domains:
  - core
  - profiles
  - bootstrap
  - cli
  - docs
  - infra

stack:
  profile: sdd-kit
  ci_workflow: .github/workflows/ci.yml
  quality_gates:
    compile: "python -m compileall -q cli/"
    manifest: 'python -c "import json; json.load(open(''bootstrap/agent-prompts/manifest.json''))"'
    profiles: "verificación archivos obligatorios por perfil (CI)"
    validate_sdd: ".github/docs/sdd — validate-sdd.ps1"
  schema_changes: null
  deploy_platform: github-releases

paths:
  sdd: .github/docs/sdd
  business: .github/docs/business
  contributing: CONTRIBUTING.md

ids:
  next_sdd: 4
  next_adr: 1

release:
  semver: true
  tag_prefix: v

kit:
  installed_version: "v1.1.0"
  installed_at: "2026-06-12"

agent:
  targets: [cursor]
  install_mode: auto
