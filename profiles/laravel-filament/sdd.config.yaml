# Valores por defecto del perfil laravel-filament

stack:
  profile: laravel-filament
  ci_workflow: .github/workflows/ci.yml
  quality_gates:
    test: "php artisan test --compact"
    format: "vendor/bin/pint --dirty"
  schema_changes: database/migrations
  deploy_platform: laravel-cloud

domains_suggested:
  - auth
  - catalogos
  - operaciones
  - ux
  - infra
  - docs
